<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dooki Admin | Login</title>

  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="stylesheet" href="/styles/admin.css">
</head>

<body class="admin-login-body">
  <main class="admin-login-shell">
    <section class="admin-login-card">

      <img src="/assets/logo-dooki.png" class="admin-login-logo">

      <h1>Login Admin</h1>

      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
      </form>

      <p id="error"></p>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/shared/supabase-client.js"></script>

  <script>
    const sb = window.supabaseClient;

    const form = document.getElementById("loginForm");
    const error = document.getElementById("error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      error.innerText = "";

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error: loginError } = await sb.auth.signInWithPassword({
        email,
        password
      });

      if (loginError) {
        error.innerText = "Email ou senha inválidos";
        return;
      }

      // valida admin
      const { data: admin } = await sb
        .from("admin_profiles")
        .select("*")
        .eq("id", data.user.id)
        .eq("is_active", true)
        .maybeSingle();

      if (!admin) {
        error.innerText = "Sem acesso admin";
        await sb.auth.signOut();
        return;
      }

      window.location.href = "/admin/admin.html";
    });
  </script>
</body>
</html>
