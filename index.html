<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dooki Admin | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="minimal-login-body">
  <main class="minimal-login-wrapper">
    <section class="minimal-login-modal">
      <div class="minimal-login-header">
        <img class="minimal-login-logo" src="logo-dooki.png" alt="Dooki">
        <span class="panel-kicker">Painel administrativo</span>
      </div>

      <div class="minimal-login-content">
        <h1>Entrar no admin</h1>
        <p class="panel-copy">Use seu acesso administrativo para entrar no painel da Dooki.</p>

        <form id="admin-login-form" class="minimal-login-form">
          <label class="field">
            <span>Email</span>
            <input class="input" id="email" name="email" type="email" placeholder="Seu email" required>
          </label>

          <label class="field">
            <span>Senha</span>
            <input class="input" id="password" name="password" type="password" placeholder="Sua senha" required>
          </label>

          <div class="error-box" id="login-error" hidden></div>

          <button class="primary-button full-width-button" type="submit" id="login-button">
            Acessar painel admin
          </button>
        </form>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>

  <script>
    (function () {
      const form = document.getElementById("admin-login-form");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const errorBox = document.getElementById("login-error");
      const loginButton = document.getElementById("login-button");

      async function tryAutoRedirect() {
        if (!window.supabaseClient) return;

        try {
          const { data } = await window.supabaseClient.auth.getUser();
          const user = data?.user;

          if (!user) return;

          const { data: profile, error } = await window.supabaseClient
            .from("admin_profiles")
            .select("*")
            .eq("id", user.id)
            .eq("is_active", true)
            .maybeSingle();

          if (error || !profile) return;

          localStorage.setItem("dooki-admin-session", JSON.stringify({
            id: user.id,
            name: profile.name || "Administrador",
            email: profile.email || user.email,
            role: profile.role || "admin",
            loginType: "supabase"
          }));

          window.location.href = "admin.html";
        } catch (error) {
          console.warn("Auto login não realizado.", error);
        }
      }

      function showError(message) {
        errorBox.hidden = false;
        errorBox.textContent = message;
      }

      function hideError() {
        errorBox.hidden = true;
        errorBox.textContent = "";
      }

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        hideError();

        const email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value;

        loginButton.disabled = true;
        loginButton.textContent = "Entrando...";

        try {
          if (!window.supabaseClient) {
            throw new Error("Supabase não configurado.");
          }

          const { data, error } = await window.supabaseClient.auth.signInWithPassword({
            email,
            password
          });

          if (error) throw error;

          const user = data?.user;
          if (!user) {
            throw new Error("Usuário não encontrado.");
          }

          const { data: profile, error: profileError } = await window.supabaseClient
            .from("admin_profiles")
            .select("*")
            .eq("id", user.id)
            .eq("is_active", true)
            .maybeSingle();

          if (profileError) throw profileError;

          if (!profile) {
            throw new Error("Seu usuário não possui acesso ao painel admin.");
          }

          localStorage.setItem("dooki-admin-session", JSON.stringify({
            id: user.id,
            name: profile.name || "Administrador",
            email: profile.email || user.email,
            role: profile.role || "admin",
            loginType: "supabase"
          }));

          window.location.href = "admin.html";
        } catch (error) {
          console.error("Erro no login:", error);
          showError(error.message || "Não foi possível entrar.");
          loginButton.disabled = false;
          loginButton.textContent = "Acessar painel admin";
        }
      });

      tryAutoRedirect();
    })();
  </script>
</body>
</html>
