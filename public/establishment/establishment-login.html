<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login Estabelecimento</title>

  <link rel="stylesheet" href="/styles/styles.css">
</head>

<body>

<h2>Login Estabelecimento</h2>

<form id="loginForm">
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Senha" required>
  <button type="submit">Entrar</button>
</form>

<p id="error"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/supabase-client.js"></script>

<script>
  const sb = window.supabaseClient;

  const form = document.getElementById("loginForm");
  const error = document.getElementById("error");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    error.innerText = "";

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error: loginError } = await sb.auth.signInWithPassword({
      email,
      password
    });

    if (loginError) {
      error.innerText = "Login inválido";
      return;
    }

    // valida vínculo com estabelecimento
    const { data: user } = await sb
      .from("establishment_users")
      .select("*")
      .eq("auth_user_id", data.user.id)
      .eq("active", true)
      .maybeSingle();

    if (!user) {
      error.innerText = "Sem vínculo com estabelecimento";
      await sb.auth.signOut();
      return;
    }

    window.location.href = "/establishment/establishment.html";
  });
</script>

</body>
</html>
