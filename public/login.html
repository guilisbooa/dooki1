<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dooki Admin | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/styles.css">
  <link rel="stylesheet" href="../styles/admin.css">
</head>
<body class="admin-login-body">
  <main class="admin-login-shell">
    <section class="admin-login-card">
      <div class="admin-login-brand">
        <img src="../_refs/assets/images/logo-dooki.png" alt="Dooki" class="admin-login-logo">
        <span class="admin-login-chip">Acesso administrativo</span>
      </div>

      <div class="admin-login-copy">
        <h1>Entrar no admin</h1>
        <p>
          Acesse o painel central da Dooki para acompanhar estabelecimentos, planos, pagamentos e suporte.
        </p>
      </div>

      <form id="loginForm" class="admin-login-form">
        <label class="field">
          <span>Email</span>
          <input class="input" type="email" id="email" placeholder="admin@dooki.com" required>
        </label>

        <label class="field">
          <span>Senha</span>
          <input class="input" type="password" id="password" placeholder="Sua senha" required>
        </label>

        <p id="error" class="admin-login-error" hidden></p>

        <button type="submit" class="primary-button full-width-button" id="loginButton">
          Entrar no painel
        </button>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../shared/supabase-client.js"></script>

  <script>
    const supabase = window.supabaseClient;
    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("error");
    const button = document.getElementById("loginButton");

    function showError(message) {
      errorEl.hidden = false;
      errorEl.textContent = message;
    }

    function hideError() {
      errorEl.hidden = true;
      errorEl.textContent = "";
    }

    function setLoading(isLoading) {
      button.disabled = isLoading;
      button.textContent = isLoading ? "Entrando..." : "Entrar no painel";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();
      setLoading(true);

      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        const { error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          throw error;
        }

        window.location.href = "../admin/admin.html";
      } catch (error) {
        console.error("Erro no login admin:", error);
        showError("Login inválido ou sem permissão de administrador.");
        setLoading(false);
      }
    });
  </script>
</body>
</html>
